# MOBIDIC Configuration - Arno River Basin
# Event simulation - November 2023


######## PROJECT DATA

basin:
  # OPTIONAL: Descriptive name of basin
  # [Any string with no blank characters, eg: Blue_Nile]
  id: Arno

  # OPTIONAL: Descriptive name of parameter set / scenario
  # [Any string with no blank characters, eg: Blue_Nile_Scenario_24]
  paramset_id: Event_November_2023_with_reservoirs

  baricenter:
    # REQUIRED: Longitude of basin baricenter [deg. East]
    lon: 11.0

    # REQUIRED: Latitude of basin baricenter [deg. North]
    lat: 44.0


######## FILE PATHS
# Paths can be absolute or relative to the position of this file

paths:
  # OPTIONAL: File where the meteo data files are stored
  # [path to .nc file, eg: /blue_nile/meteodata/meteodata.nc]
  meteodata: meteodata/Arno_meteodata.nc

  # OPTIONAL: NetCDF file where the meteo data (raster format) are stored (alternative to above)
  # [path to .nc file, eg: /blue_nile/meteodata/meteoraster.nc]
  meteoraster:

  # REQUIRED: Consolidated raster dataset to be created by GIS preprocessing
  # [path to .nc file, eg: /blue_nile/geodat/gisdata.nc]
  gisdata: gisdata/Arno_gisdata.nc

  # REQUIRED: Consolidated hydrographic network to be created by GIS preprocessing (geoparquet format)
  # [path to .parquet file, eg: /blue_nile/geodat/net.parquet]
  network: gisdata/Arno_net.parquet

  # OPTIONAL: Consolidated reservoirs dataset to be created by GIS preprocessing (geoparquet format)
  # [path to .parquet file, eg: /blue_nile/geodat/reservoirs.parquet]
  reservoirs: gisdata/Arno_reservoirs.parquet

  # REQUIRED: Directory where the model states will be stored
  # [directory path including terminal /, eg: /blue_nile/states/]
  states: states/

  # REQUIRED: Directory where output report files will be stored
  # [directory path including terminal /, eg: /blue_nile/outputs/]
  output: output/


######## VECTOR FILES

vector_files:
  river_network:
    # REQUIRED: Shape of river network
    # [full pathname to .shp file, eg: /blue_nile/geodat/river_network.shp]
    shp: ../datasets/Arno/shp/Arno_river_network.shp


####### RASTER FILES

raster_files:
  # REQUIRED: Grid of basin elevation in meters above sea level
  # [full pathname to .tif file, eg: /blue_nile/geodat/dem.tif]
  dtm: ../datasets/Arno/raster/dtm.tif

  # REQUIRED: Grid of flow directions
  # [full pathname to .tif file, eg: /blue_nile/geodat/flowdir.tif]
  flow_dir: ../datasets/Arno/raster/flowdir.tif

  # REQUIRED: Grid of flow accumulation, as number of upstream cells
  # [full pathname to .tif file, eg: /blue_nile/geodat/flowacc.tif]
  flow_acc: ../datasets/Arno/raster/flowacc.tif

  # REQUIRED: Grid of maximum water holding capacity in soil small pores, in millimiters
  # [full pathname to .tif file, eg: /blue_nile/geodat/Wc0.tif]
  Wc0: ../datasets/Arno/raster/cap.tif

  # REQUIRED: Grid of maximum water holding capacity in soil large pores, in millimiters
  # [full pathname to .tif file, eg: /blue_nile/geodat/Wg0.tif]
  Wg0: ../datasets/Arno/raster/grav.tif

  # REQUIRED: Grids of soil hydraulic conductivity, in millimiters per hour
  # [full pathname to .tif file, eg: /blue_nile/geodat/Ks.tif]
  ks: ../datasets/Arno/raster/ks.tif

  # OPTIONAL: Grid of (real or ideal) aquifer conductivity, in 1/seconds
  # [full pathname to .tif file, eg: /blue_nile/geodat/Kf.tif]
  kf:

  # OPTIONAL: Grid of turbulent exchange coeff. for heat, non dimensional
  # [full pathname to .tif file, eg: /blue_nile/geodat/CH.tif]
  CH:

  # OPTIONAL: Grid of surface albedo, non dimensional
  # [full pathname to .tif file, eg: /blue_nile/geodat/Alb.tif]
  Alb:

  # OPTIONAL: Grid mask defining the artesian aquifer(s) extension. Not implemented yet.
  # [full pathname to .tif file, eg: /blue_nile/geodat/Ma.tif]
  Ma:

  # OPTIONAL: Grid mask defining the freatic aquifer(s) extension
  # [full pathname to .tif file, eg: /blue_nile/geodat/Mf.tif]
  Mf:

  # OPTIONAL: Grid of percolation coefficient, in one over seconds
  # [full pathname to .tif file]
  gamma:

  # OPTIONAL: Grid of adsorption coefficient, in one over seconds
  # [full pathname to .tif file]
  kappa:

  # OPTIONAL: Grid of hypodermic flow coefficient, in one over seconds
  # [full pathname to .tif file]
  beta:

  # OPTIONAL: Grid of hillslope flow coefficient, in one over seconds
  # [full pathname to .tif file]
  alpha: 

raster_settings:
  # REQUIRED: Flow direction pointer type
  # ['Grass' for 1-8 notation or 'Arc' for 1-2-4-8-16-32-64-128 notation]
  flow_dir_type: Grass


####### GLOBAL LAND PARAMETERS
# These parameters can be defined as single values (default for the entire basin)
# or as raster files (see above). If both are provided, the raster files will
# override the single values.

parameters:
  soil:
    # OPTIONAL: Default value of maximum water holding capacity in soil small pores, in millimiters
    # [positive number in float or exp notation, default: 0.0]
    Wc0: 0.000e+000

    # OPTIONAL: Default value of maximum water holding capacity in soil large pores, in millimiters
    # [positive number in float or exp notation, default: 0.0]
    Wg0: 0.000e+000

    # OPTIONAL: Default value of soil hydraulic conductivity, in mm/h
    # [positive number in float or exp notation, default: 1.0]
    ks: 1.000e+000

    # OPTIONAL: Default value of minimum soil hydraulic conductivity, in mm/h
    # [positive number in float or exp notation]
    ks_min:

    # OPTIONAL: Default value of maximum soil hydraulic conductivity, in mm/h
    # [positive number in float or exp notation]
    ks_max:

    # OPTIONAL: Default value of (real or ideal) aquifer conductivity, in 1/s
    # [positive number in float or exp notation, default: 1.0e-7]
    kf: 1.000e-007

    # REQUIRED: Percolation coefficient, in 1/s
    # [positive number in float or exp notation]
    gamma: 5.0e-04

    # REQUIRED: Adsorption coefficient, in 1/s
    # [positive number in float or exp notation]
    kappa: 1.0e-04

    # REQUIRED: Hypodermic flow coefficient, in 1/s
    # [positive number in float or exp notation]
    beta: 5.0e-05

    # REQUIRED: Hillslope flow coefficient, in 1/s
    # [positive number in float or exp notation]
    alpha: 8.0e-06
  
  energy:
    # OPTIONAL: Deep ground temperature, in deg. Kelvin
    # [positive number in float or exp notation, default: 290.0]
    Tconst: 2.900e+002

    # OPTIONAL: Soil thermal conductivity, in W/m/K
    # [positive number in float or exp notation, default: 2.5]
    kaps: 2.500e+000

    # OPTIONAL: Soil thermal diffusivity, in m²/s
    # [positive number in float or exp notation, default: 0.8e-6]
    nis: 0.8000e-006

    # OPTIONAL: Default value of turbulent exchange coeff. for heat, non dimensional
    # [positive number in float or exp notation, default: 1e-3]
    CH: 1.000e-003

    # OPTIONAL: Default value of surface albedo, non dimensional
    # [positive number in float or exp notation, default: 0.2]
    Alb: 2.000e-001

  routing:
    # REQUIRED: Type of channel routing scheme
    # [one among the following options 'Linear']
    method: Linear

    # REQUIRED: Flood wave celerity in channels, in m/s
    # [positive value in float or exp notation]
    wcel: 5.18

    # OPTIONAL: Width of channels with first Strahler order, in meters
    # [positive value in float or exp notation, default: 1.0]
    Br0: 1.0

    # OPTIONAL: Exponent of equation W = Br0*O^NBr, where W=Width of channels and O=Strahler order
    # [positive value > 1 in float or exp notation, default: 1.5]
    NBr: 1.5

    # OPTIONAL: Manning roughness coefficient for channels, in s/m^(1/3)
    # [positive value in float or exp notation, default: 0.03]
    n_Man: 0.03

  groundwater:
    # REQUIRED: Groundwater model type
    # [one among the following options: None, Linear]
    model: None

    # OPTIONAL: Global water loss from aquifers, in m³/s
    # [positive value in float or exp notation]
    global_loss: 0.000e+000

  reservoirs:
    # OPTIONAL: Shapefile of reservoirs and lakes (polygon features)
    # [path to .shp file]
    res_shape: ../datasets/Arno/reservoirs/reservoirs.shp

    # OPTIONAL: Reservoir stage-storage curves (CSV format)
    # [path to .csv file]
    stage_storage: ../datasets/Arno/reservoirs/stage_storage.csv

    # OPTIONAL: Reservoir regulation curves (CSV format)
    # [path to .csv file]
    regulation_curves: ../datasets/Arno/reservoirs/regulation_curves.csv

    # OPTIONAL: Reservoir regulation schedules (CSV format)
    # [path to .csv file]
    regulation_schedule: ../datasets/Arno/reservoirs/regulation_schedule.csv

  multipliers:
    # OPTIONAL: Multiplying factor of soil hydraulic conductivity, non dimensional
    # [positive value in float or exp notation]
    ks_factor: 1.000e+000

    # OPTIONAL: Multiplying factor of maximum water holding capacity in soil small pores, non dimensional
    # [positive value in float or exp notation]
    Wc_factor: 1.000e+000

    # OPTIONAL: Multiplying factor of maximum water holding capacity in soil large pores, non dimensional
    # [positive value in float or exp notation]
    Wg_factor: 1.000e+000

    # OPTIONAL: Transition factor between gravitational and capillary storage, non dimensional
    # [positive value in float or exp notation]
    Wg_Wc_tr: 1.000e+000

    # OPTIONAL: Multiplying factor of turbulent exchange coeff. for heat, non dimensional
    # [positive value in float or exp notation]
    CH_factor: 1.000e+000

    # OPTIONAL: Multiplying factor for flood wave celerity, non dimensional
    # [positive value in float or exp notation]
    cel_factor: 1.00e+000

    # OPTIONAL: Scale factor for fraction of channalized flow, non dimensional
    # [positive value in float or exp notation]
    chan_factor: 0.000e+000


####### INITIAL CONDITIONS

initial_conditions:
  # OPTIONAL: Initial depth of hillslope runoff, in meters
  # [positive value in float or exp notation, default: 0.0]
  Ws: 0.00

  # OPTIONAL: Initial relative saturation of capillary soil, non dimensional
  # [positive value in float or exp notation in the range 0-1, default: 0.3]
  Wcsat: 0.3

  # OPTIONAL: Initial relative saturation of gravitational soil, non dimensional
  # [positive value in float or exp notation in the range 0-1, default: 0.01]
  Wgsat: 0.01

  # OPTIONAL: Initial volume in reservoirs
  # [path to .csv file with columns 'reservoir_id' and 'volume_m3']
  reservoir_volumes: ../datasets/Arno/reservoirs/initial_conditions.csv


####### SIMULATION CONTROLS

simulation:
  # REQUIRED: Data and model time step, in seconds, same timestep as in meteodata
  # [positive value in float or exp notation, eg: 86400 for daily data]
  timestep: 900

  # OPTIONAL: Decimation factor from grid data space resolution to model space resolution, non dimensional
  # [positive integer number, default: 1]
  decimation: 1

  # REQUIRED: Type of soil hydrology scheme
  # [one among the following options 'Bucket']
  soil_scheme: Bucket

  # REQUIRED: Type of surface energy balance scheme
  # [one among the following options 'None', '1L']
  energy_balance: None

  ## OPTIONAL: Precipitation spatial interpolation method
  # [one among the following options: 'Nearest', 'IDW' (default, faster)]
  precipitation_interp: IDW

####### OUTPUT CONTROLS

output_states:
  # OPTIONAL: Save states of river network (discharge, lateral inflow). Default: true
  # [boolean]
  discharge: true

  # OPTIONAL: Save states of reservoirs and lakes. Default: false
  # [boolean]
  reservoir_states: true

  # OPTIONAL: Save states of soil small pores. Default: true
  # [boolean]
  soil_capillary: true

  # OPTIONAL: Save states of soil large pores. Default: true
  # [boolean]
  soil_gravitational: true

  # OPTIONAL: Save states of plant/canopy water. Default: true
  # [boolean]
  soil_plant: true

  # OPTIONAL: Save states of surface water. Default: true
  # [boolean]
  soil_surface: true

  # OPTIONAL: Save states of land surface temperature. Default: false
  # [boolean]
  surface_temperature: false

  # OPTIONAL: Save states of ground temperature. Default: false
  # [boolean]
  ground_temperature: false

  # OPTIONAL: Save states of aquifers. Default: false
  # [boolean]
  aquifer_head: false

  # OPTIONAL: Save states of evapotranspiration. Default: false
  # [boolean]
  evapotranspiration: false


output_states_settings:
  # OPTIONAL: Format for state output files
  # [one among the following options: 'netCDF' (default)]
  output_format: netCDF

  # OPTIONAL: Which time steps to save
  # [one among the following options: 'all', 'final', 'list', 'None' (default)]
  output_states: final

  # OPTIONAL: Time interval for state output, in seconds. Used with output_states=all.
  # [positive integer. If empty, equal to timestep]
  output_interval: 

  # OPTIONAL: List of time steps to save, as dates with format 'YYYY-MM-DD HH:MM:SS'. Used with output_states=list.
  output_list: []

  # OPTIONAL: How often to flush states to disk during simulation (controls memory usage)
  # [positive integer N = flush every N timesteps, -1 = flush only at end (default)]
  # Examples:
  flushing: -1

  # OPTIONAL: Maximum file size for state output files, in megabytes (MB)
  # NOTE: Effective only if flushing is set to a positive integer
  # [positive float in MB. When a file reaches this size, a new chunk file will be created. Default: 500 MB]
  max_file_size: 500

output_report:
  # OPTIONAL: Save discharge hydrograph at selected reach IDs. Default: true
  # [boolean]
  discharge: true

  # OPTIONAL: Save lateral inflow hydrograph at selected reach IDs. Default: false
  # [boolean]
  lateral_inflow: true
  
output_report_settings:
  # OPTIONAL: Format for report output files
  # [one among the following options: 'csv', 'Parquet' (default)]
  output_format: Parquet

  # OPTIONAL: Time interval for report output, in seconds
  # [positive integer. If empty, equal to timestep]
  report_interval:

  # OPTIONAL: Method for selecting reaches to output
  # [one among the following options: 'all' (default), 'file', 'list']
  reach_selection: list

  # OPTIONAL: Path to JSON file containing reach IDs to output
  # [full pathname to .json file. Used if reach_selection=file]
  sel_file: reach_ids.json

  # OPTIONAL: List of reach IDs to output
  # [list of integers, e.g. [1234, 5678]. Used if reach_selection=list]
  sel_list: [278, 195, 275, 376]

output_forcing_data:
  # OPTIONAL: Save meteorological forcing data to NetCDF. Default: false
  # [boolean]
  meteo_data: false

####### ADVANCED SETTINGS

advanced:
  # OPTIONAL: Logging level
  # [one among the following options: 'DEBUG', 'INFO' (default), 'SUCCESS', 'WARNING', 'ERROR']
  log_level: INFO

  # OPTIONAL: Path to log file
  # [full pathname to .log file. If empty, only logs to console]
  log_file: mobidic.log

