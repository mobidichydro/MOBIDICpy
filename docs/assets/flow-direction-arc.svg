<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="0 0 340 340" role="img" aria-labelledby="title desc">
  <title id="title">Arc flow direction notation</title>
  <desc id="desc">Three-by-three grid showing the ArcGIS D8 flow direction codes with arrows radiating from the center.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#111111" />
    </marker>
    <style>
      .frame { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .grid { stroke: #111111; stroke-width: 2; }
      .arrow { fill: none; stroke: #111111; stroke-width: 2.5; marker-end: url(#arrow); }
      .label {
        fill: #111111;
        font-family: "Times New Roman", Georgia, serif;
        font-size: 34px;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .tight {
        font-size: 30px;
      }
    </style>
  </defs>

  <rect class="frame" x="20" y="20" width="300" height="300" />
  <line class="grid" x1="120" y1="20" x2="120" y2="320" />
  <line class="grid" x1="220" y1="20" x2="220" y2="320" />
  <line class="grid" x1="20" y1="120" x2="320" y2="120" />
  <line class="grid" x1="20" y1="220" x2="320" y2="220" />

  <line class="arrow" x1="170" y1="170" x2="110" y2="110" />
  <line class="arrow" x1="170" y1="170" x2="170" y2="95" />
  <line class="arrow" x1="170" y1="170" x2="230" y2="110" />
  <line class="arrow" x1="170" y1="170" x2="95" y2="170" />
  <line class="arrow" x1="170" y1="170" x2="245" y2="170" />
  <line class="arrow" x1="170" y1="170" x2="110" y2="230" />
  <line class="arrow" x1="170" y1="170" x2="170" y2="245" />
  <line class="arrow" x1="170" y1="170" x2="230" y2="230" />

  <text class="label" x="70" y="70">32</text>
  <text class="label" x="170" y="70">64</text>
  <text class="label tight" x="270" y="70">128</text>
  <text class="label" x="70" y="170">16</text>
  <text class="label" x="270" y="170">1</text>
  <text class="label" x="70" y="270">8</text>
  <text class="label" x="170" y="270">4</text>
  <text class="label" x="270" y="270">2</text>
</svg>
