name: Build/Publish Development Docs

permissions: write-all

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docs-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --extra doc
      - name: Setup Docs Deploy user
        run: |
          git config --global user.name "Docs Deploy"
          git config --global user.email "docs.deploy@github.com"
      - name: Deploy docs with mike
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run mike deploy --push develop
          uv run mike set-default --push develop
