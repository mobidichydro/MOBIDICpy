name: Documentation

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --extra doc
      - name: Test mkdocs build
        run: uv run mkdocs build --strict
