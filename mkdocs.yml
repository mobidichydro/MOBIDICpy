site_name: MOBIDICpy
site_description: MOBIDIC - Distributed and continuous hydrological balance model
site_author: Fabio Castelli, Matteo Masi
site_url: https://mobidichydro.github.io/mobidicpy
repo_name: mobidicpy
repo_url: https://github.com/mobidichydro/mobidicpy
edit_uri: "edit/main/docs/"
copyright: Copyright &copy; 2025, MOBIDICpy Project

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Development: development.md
  - Examples: examples.md
  - API Reference: reference.md

theme:
  name: "material"
  favicon: assets/icon.png
  logo: assets/logo.png
  language: en
  # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#primary-color
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - content.tabs.link
    # - header.autohide
    # - navigation.expand
    # - navigation.instant
    # - navigation.tabs.sticky


plugins:
- search
- autorefs
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        options:
          show_submodules: false
          show_source: true
          show_docstring_description: true
          docstring_style: google
          docstring_section_style: table

# Styled blocks: https://squidfunk.github.io/mkdocs-material/reference/admonitions/#supported-types
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - smarty
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/fontawesome.min.js
  - assets/solid.min.js
  - assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mobidichydro/mobidicpy
